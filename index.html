<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostHarvest — Atmos Mock</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; color: #1a1a1a; }
  #app { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

  /* === SPLASH === */
  .splash { width: 100%; max-width: 880px; }
  .splash h1 { color: #f0f7f0; text-align: center; margin-bottom: 8px; font-size: 32px; font-weight: 700; }
  .splash .subtitle { color: #a8c5a0; text-align: center; margin-bottom: 40px; }
  .splash-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .splash-card { background: #f0f7f0; border-radius: 16px; padding: 36px 28px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; border: 2px solid transparent; }
  .splash-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); border-color: #2e7d32; }
  .splash-card .icon { font-size: 36px; margin-bottom: 12px; }
  .splash-card h3 { color: #1a6b1a; margin-bottom: 8px; font-size: 20px; }
  .splash-card p { color: #555; font-size: 14px; line-height: 1.5; }

  /* === AI LOOKUP === */
  .ai-panel { background: #f0f7f0; border-radius: 16px; padding: 36px; width: 100%; max-width: 640px; }
  .ai-panel h2 { color: #1a6b1a; margin-bottom: 8px; }
  .ai-panel .hint { color: #666; font-size: 13px; margin-bottom: 20px; }
  .ai-input-row { display: flex; gap: 12px; }
  .ai-input { flex: 1; padding: 14px 16px; border-radius: 10px; border: 2px solid #c8d8c4; font-size: 15px; outline: none; background: #fff; color: #1a1a1a; }
  .ai-input:focus { border-color: #2e7d32; }
  .btn { padding: 14px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
  .btn-primary { background: #2e7d32; color: #fff; }
  .btn-primary:hover { background: #1a6b1a; }
  .btn-secondary { background: #fff; color: #2e7d32; border: 1px solid #2e7d32; }
  .btn-link { background: transparent; color: #555; text-decoration: underline; }
  .spinner-block { text-align: center; padding: 40px 20px; }
  .spinner { width: 48px; height: 48px; border: 4px solid #c8d8c4; border-top-color: #2e7d32; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-status { color: #1a6b1a; font-weight: 600; }
  .reveal-card { background: #fff; border-radius: 12px; padding: 24px; margin-top: 20px; }
  .reveal-card .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; gap: 12px; }
  .reveal-card .row:last-child { border-bottom: none; }
  .reveal-card .row .label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .reveal-card .row .value { color: #1a1a1a; font-weight: 600; text-align: right; }
  .reveal-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .not-found { text-align: center; color: #c0392b; padding: 24px; background: #fff5f4; border-radius: 10px; margin-top: 16px; }

  /* === WIZARD STEP 2 === */
  .rooms-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .room-row { background: #fff; border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .room-row .info { font-size: 14px; }
  .room-row .info b { color: #1a6b1a; }
  .room-row .info small { color: #888; display: block; margin-top: 2px; }
  .room-row .remove { color: #c0392b; cursor: pointer; font-size: 12px; background: transparent; border: none; }
  .add-room-form { background: #fff; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .add-room-form .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .crop-autocomplete { position: relative; }
  .crop-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #c8d8c4; border-top: none; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; z-index: 10; }
  .crop-suggestions .item { padding: 10px 12px; cursor: pointer; font-size: 13px; }
  .crop-suggestions .item:hover, .crop-suggestions .item.active { background: #e8f5e9; color: #1a6b1a; }

  /* === FETCH ANIMATION === */
  .fetch-screen { text-align: center; color: #f0f7f0; }
  .fetch-screen .uc-davis { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #a8c5a0; margin-bottom: 16px; }
  .fetch-screen h2 { font-size: 24px; font-weight: 600; margin-bottom: 32px; }
  .fetch-screen .spinner { border-color: #2a3a2a; border-top-color: #4caf50; }
  .fetch-screen .room-tally { color: #a8c5a0; font-size: 13px; margin-top: 24px; }

  /* === DASHBOARD FRAME === */
  .frame { background: #0d0d0d; border-radius: 18px; padding: 6px; width: 100%; max-width: 1100px; box-shadow: 0 30px 80px rgba(0,0,0,0.8); margin: 0 auto; }
  .dash { background: #f0f7f0; border-radius: 13px; overflow: hidden; }
  .dash-nav { background: #1a6b1a; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .dash-nav .nav-arrows { display: flex; gap: 4px; margin-right: 8px; }
  .dash-nav .nav-arrow { background: rgba(255,255,255,0.15); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .dash-nav .nav-arrow:hover:not(:disabled) { background: rgba(255,255,255,0.3); }
  .dash-nav .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  .dash-nav .logo { display: flex; align-items: center; gap: 8px; color: white; font-weight: 700; font-size: 15px; }
  .dash-nav .logo svg { display: block; }
  .dash-nav .crumbs { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.85); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .dash-nav .crumb-dot { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; }
  .dash-nav .crumb-dot.done { background: #4caf50; color: white; }
  .dash-nav .crumb-dot.active { background: #4db6ac; color: white; }
  .dash-nav .crumb-dot.todo { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }
  .dash-nav .crumb-line { width: 24px; height: 2px; background: rgba(255,255,255,0.3); }
  .dash-nav .user { display: flex; align-items: center; gap: 8px; color: white; font-size: 12px; }
  .dash-nav .reset { background: rgba(255,255,255,0.15); color: white; border: none; padding: 6px 12px; border-radius: 16px; font-size: 11px; cursor: pointer; }
  .dash-nav .reset:hover { background: rgba(255,255,255,0.25); }

  /* === FACILITY HEADER === */
  .fac-header { padding: 20px 24px; background: white; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e0e0e0; gap: 16px; flex-wrap: wrap; }
  .fac-header .title h2 { font-size: 22px; color: #1a1a1a; }
  .fac-header .title .hq { color: #888; font-size: 13px; margin-top: 2px; }
  .fac-header .actions { display: flex; gap: 10px; align-items: center; }
  .toggle { display: inline-flex; background: #f0f0f0; border-radius: 20px; padding: 3px; }
  .toggle button { background: transparent; border: none; padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 16px; color: #888; }
  .toggle button.active { background: #2e7d32; color: white; }
  .add-room-btn { background: #2e7d32; color: white; border: none; padding: 8px 16px; border-radius: 18px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .add-room-btn:hover { background: #1a6b1a; }

  /* === FACILITY BODY === */
  .fac-body { padding: 24px; min-height: 480px; background: #f0f7f0; }
  .grid-tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .tile { background: white; border-radius: 12px; padding: 18px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .tile:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
  .tile h4 { font-size: 15px; color: #1a1a1a; margin-bottom: 4px; }
  .tile .crop { color: #1a6b1a; font-size: 12px; margin-bottom: 12px; font-weight: 600; }
  .tile .ethy { font-size: 28px; font-weight: 700; color: #1a1a1a; }
  .tile .ethy small { font-size: 12px; font-weight: 500; color: #888; }
  .tile .badge { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 8px; }
  .badge.ok { background: #e8f5e9; color: #1a6b1a; }
  .badge.warn { background: #fff5e1; color: #b87800; }
  .badge.crit { background: #fff5f4; color: #c0392b; }
  .tile .atmos-pill { display: inline-block; margin-top: 8px; margin-left: 8px; font-size: 10px; padding: 4px 10px; border-radius: 10px; background: #f0f0f0; color: #888; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .tile .atmos-pill.on { background: #1a6b1a; color: white; }
  .tile.attention { border: 2px solid #f5cccc; background: #fff8f7; }
  .tile.attention h4 { color: #c0392b; }
  .tile .reason { font-size: 11px; color: #c0392b; margin-top: 8px; line-height: 1.4; font-weight: 600; }

  #map-container { width: 100%; height: 460px; border-radius: 12px; }
  .leaflet-container { font-family: 'Segoe UI', sans-serif; }
  .room-pin-inner { width: 30px; height: 30px; border-radius: 50%; background: #ff9800; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4); cursor: pointer; }
  .room-pin-inner.on { background: #2e7d32; }
  .room-pin-inner.crit { background: #c0392b; }

  /* === NOTIFICATIONS === */
  .bell-btn { background: rgba(255,255,255,0.15); color: white; border: none; padding: 6px 10px; border-radius: 16px; cursor: pointer; position: relative; font-size: 14px; }
  .bell-btn:hover { background: rgba(255,255,255,0.25); }
  .bell-badge { position: absolute; top: -4px; right: -4px; background: #ff5722; color: white; font-size: 9px; padding: 2px 5px; border-radius: 8px; font-weight: 700; min-width: 16px; text-align: center; }
  .notif-overlay { position: fixed; inset: 0; z-index: 999; }
  .notif-panel { position: absolute; top: 56px; right: 24px; background: white; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.3); width: 380px; max-height: 480px; overflow: hidden; z-index: 1000; display: flex; flex-direction: column; }
  .notif-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: #1a1a1a; flex: 0 0 auto; }
  .notif-header .clear { background: transparent; border: none; color: #2e7d32; cursor: pointer; font-size: 12px; font-weight: 600; }
  .notif-list { padding: 4px 0; overflow-y: auto; flex: 1 1 auto; }
  .notif-empty { padding: 30px 16px; text-align: center; color: #888; font-size: 13px; }
  .notif-item { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; }
  .notif-item:last-child { border-bottom: none; }
  .notif-item:hover { background: #fafafa; }
  .notif-time { font-size: 10px; color: #888; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; }
  .notif-room { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-top: 2px; }
  .notif-issue { font-size: 12px; font-weight: 600; margin-top: 4px; }
  .notif-issue.ok { color: #1a6b1a; }
  .notif-issue.warn { color: #b87800; }
  .notif-issue.crit { color: #c0392b; }
  .notif-cause { font-size: 12px; color: #666; margin-top: 2px; line-height: 1.4; }

  /* === ATMOS ALL === */
  .atmos-all-btn { background: #1a6b1a; color: white; border: none; padding: 8px 14px; border-radius: 18px; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .atmos-all-btn.off { background: #c0392b; }
  .atmos-all-btn:hover { filter: brightness(1.08); }

  /* === ROOM === */
  .tabs-row { background: white; padding: 0 24px; display: flex; align-items: center; border-bottom: 1px solid #e0e0e0; gap: 4px; }
  .tabs-row .room-name { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-right: 16px; padding: 14px 0; }
  .tabs-row .tab { padding: 14px 14px; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; color: #888; }
  .tabs-row .tab.active { color: white; background: #2e7d32; border-radius: 18px; margin: 6px 4px; padding: 8px 16px; }
  .tabs-row .back { margin-left: auto; padding: 14px 0; color: #888; cursor: pointer; font-size: 13px; }
  .tabs-row .back:hover { color: #2e7d32; }
  .crop-strip { padding: 14px 24px; background: white; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #f0f0f0; font-size: 12px; flex-wrap: wrap; }
  .crop-strip .col { display: flex; align-items: baseline; gap: 6px; }
  .crop-strip .col .lbl { color: #888; font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; }
  .crop-strip .col .val { color: #1a1a1a; font-weight: 600; }
  .crop-strip .col .val.alert { color: #c0392b; font-weight: 700; }
  .crop-strip .ca-pill { background: #2e7d32; color: white; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
  .crop-strip .note { color: #888; font-style: italic; font-size: 11px; margin-left: auto; max-width: 240px; }
  .atmos-bar { background: #e8f5e9; padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .atmos-bar .demo-pill { background: white; padding: 4px 12px; border-radius: 12px; font-size: 11px; color: #888; letter-spacing: 1px; }
  .atmos-toggle { background: white; padding: 8px 18px; border-radius: 22px; border: 2px solid #2e7d32; cursor: pointer; font-weight: 700; font-size: 13px; color: #2e7d32; display: inline-flex; align-items: center; gap: 8px; transition: background 0.3s, color 0.3s; }
  .atmos-toggle.on { background: #2e7d32; color: white; }
  .atmos-status { font-size: 13px; color: #1a6b1a; }
  .atmos-status.warn { color: #b87800; }
  .room-body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 240px; gap: 16px; background: #f0f7f0; }
  .bars-card { background: white; border-radius: 10px; padding: 18px; }
  .bar-row { display: grid; grid-template-columns: 110px 1fr 90px; gap: 12px; align-items: center; padding: 10px 0; }
  .bar-row .lbl { font-size: 11px; color: #888; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; }
  .bar-track { background: #f0f0f0; height: 14px; border-radius: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 7px; transition: width 3s cubic-bezier(.2,.7,.3,1), background 3s ease; }
  .bar-fill.fast { transition: width 1s cubic-bezier(.2,.7,.3,1), background 1s ease; }
  .bar-row .target { font-size: 11px; color: #888; text-align: right; }
  .stat-card { background: white; border-radius: 10px; padding: 16px; }
  .stat-card .ethy-big { font-size: 36px; font-weight: 700; color: #1a1a1a; line-height: 1; margin-top: 6px; }
  .stat-card .ethy-big small { font-size: 12px; color: #888; font-weight: 500; }
  .stat-card .label-row { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
  .stat-card .target-line { color: #888; font-size: 11px; margin-top: 4px; }
  .stat-card .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-top: 14px; }
  .mini { font-size: 12px; }
  .mini .v { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .mini .l { color: #888; font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
  .mini .t { color: #888; font-size: 9px; margin-top: 2px; }
  .system-status-card { background: white; border-radius: 10px; padding: 14px; margin-top: 12px; text-align: center; }
  .system-status-card .lbl { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
  .system-status-card .pill { background: #2e7d32; color: white; padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 700; margin-top: 6px; display: inline-block; }
  .system-status-card .pill.warn { background: #b87800; }
  .chart-card { background: white; border-radius: 10px; padding: 16px; margin: 16px 24px 24px; }

  /* === KPI STRIP === */
  .kpi-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 16px 24px; background: linear-gradient(135deg, #1a6b1a 0%, #2e7d32 100%); }
  .kpi-card { background: rgba(255,255,255,0.10); backdrop-filter: blur(6px); border-radius: 12px; padding: 14px 18px; color: white; }
  .kpi-card .lbl { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,0.75); font-weight: 600; }
  .kpi-card .val { font-size: 26px; font-weight: 700; margin-top: 4px; line-height: 1.1; }
  .kpi-card .delta { font-size: 11px; color: #b9f2b9; margin-top: 2px; font-weight: 600; }
  .kpi-card .delta.down { color: #ffc6c6; }

  /* === TILE METRICS GRID === */
  .tile-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
  .tile-metric { background: #f7faf7; border-radius: 6px; padding: 6px 8px; }
  .tile-metric .m-lbl { font-size: 9px; color: #888; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
  .tile-metric .m-val { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-top: 1px; }
  .tile.attention .tile-metric { background: #fff0ef; }
  .tile.attention .tile-metric .m-val.alert { color: #c0392b; }

  /* === INJECT BUTTON === */
  .inject-btn { background: #ff9800; color: white; border: none; padding: 6px 12px; border-radius: 16px; cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
  .inject-btn:hover { background: #f57c00; }

  /* === AI TOAST === */
  .ai-toast { position: fixed; bottom: 24px; right: 24px; background: white; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.3); padding: 16px 18px; width: 340px; z-index: 2000; border-left: 4px solid #2e7d32; animation: toastIn 0.4s cubic-bezier(0.2, 0.8, 0.3, 1.2); }
  .ai-toast .head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ai-toast .head .badge-ai { background: #2e7d32; color: white; font-size: 9px; padding: 2px 8px; border-radius: 8px; font-weight: 700; letter-spacing: 0.8px; }
  .ai-toast .head .x { margin-left: auto; background: transparent; border: none; cursor: pointer; color: #888; font-size: 18px; line-height: 1; padding: 0 4px; }
  .ai-toast .msg { font-size: 13px; color: #1a1a1a; line-height: 1.4; margin-bottom: 12px; }
  .ai-toast .actions { display: flex; gap: 8px; }
  .ai-toast .actions button { flex: 1; padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; }
  .ai-toast .actions .accept { background: #2e7d32; color: white; }
  .ai-toast .actions .accept:hover { background: #1a6b1a; }
  .ai-toast .actions .dismiss { background: #f0f0f0; color: #555; }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* === SPLASH TRUST STRIP === */
  .splash-trust { text-align: center; margin-top: 32px; }
  .splash-trust .lbl { color: #6b8c63; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .splash-trust .pills { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .splash-trust .pill { background: rgba(255,255,255,0.06); border: 1px solid rgba(168,197,160,0.25); color: #c8dcc4; padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 600; }
</style>
</head>
<body>
<div id="app">Loading…</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
// === CONSTANTS ===
const CROPS = {

function regionLatLng(addressOrCity) {
  const lower = (addressOrCity || '').toLowerCase();
  for (const key of Object.keys(REGIONS)) {
    if (key !== 'default' && lower.includes(key)) return REGIONS[key];
  }
  return REGIONS.default;
}

function matchCompany(input) {
  const lower = (input || '').toLowerCase().trim();
  if (!lower) return null;
  return COMPANIES.find(c => c.matchKeys.some(k => lower.includes(k))) || null;
}

function cropOptions(query) {
  const q = (query || '').toLowerCase().trim();
  const all = Object.entries(CROPS).map(([id, c]) => ({ id, displayName: c.displayName }));
  if (!q) return all.slice(0, 8);
  return all.filter(c => c.displayName.toLowerCase().includes(q)).slice(0, 8);
}

function makeNotifications(rooms) {
  const out = [];
  const now = Date.now();
  const count = Math.min(12, Math.max(6, Math.floor(rooms.length * 0.5)));
  for (let i = 0; i < count; i++) {
    const tmpl = NOTIFICATION_TEMPLATES[Math.floor(Math.random() * NOTIFICATION_TEMPLATES.length)];
    const room = rooms[Math.floor(Math.random() * rooms.length)];
    // distribute timestamps across last 6 hours, with bias toward recent
    const minsAgo = Math.floor(Math.pow(Math.random(), 1.5) * 360);
    out.push({
      id: 'n_' + Math.random().toString(36).slice(2, 9),
      ts: now - minsAgo * 60 * 1000,
      roomId: room.id,
      roomName: room.name,
      issue: tmpl.issue,
      cause: tmpl.cause,
      severity: tmpl.severity
    });
  }
  out.sort((a, b) => b.ts - a.ts);
  return out;
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + ' min ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' hr ago';
  const d = Math.floor(h / 24);
  return d + ' days ago';
}

  catch { /* corrupt — ignore */ }
}

function resetState() {
  localStorage.removeItem(STORAGE_KEY);
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }
  render();

let _navFromHistory = false;

function snapshotState() {
  return {
    view: state.view,
    currentRoomId: state.currentRoomId,
    dashboardView: state.dashboardView
  };
}

function applySnapshot(snap) {
  state.view = snap.view;
  state.currentRoomId = snap.currentRoomId;
  state.dashboardView = snap.dashboardView;
}

function setView(view) {
  state.view = view;
  if (!_navFromHistory) {
    // truncate any forward history, push new snapshot
    state.history = state.history.slice(0, state.historyIdx + 1);
    state.history.push(snapshotState());
    state.historyIdx = state.history.length - 1;
    // cap history length
    if (state.history.length > 50) {
      state.history.shift();
      state.historyIdx--;
    }
  }
  saveState();
  render();
}

function goBack() {
  if (state.historyIdx <= 0) return;
  state.historyIdx--;
  _navFromHistory = true;
  applySnapshot(state.history[state.historyIdx]);
  saveState();
  render();
  _navFromHistory = false;
}

function goForward() {
  if (state.historyIdx >= state.history.length - 1) return;
  state.historyIdx++;
  _navFromHistory = true;
  applySnapshot(state.history[state.historyIdx]);
  saveState();
  render();
  _navFromHistory = false;
}

function canGoBack()    { return state.historyIdx > 0; }
function canGoForward() { return state.historyIdx < state.history.length - 1; }

// === CROP MATH HELPERS ===
function rangeMid(rangeStr) {
  const cleaned = String(rangeStr).replace(/[^\d\.\-––]/g, '');
  const parts = cleaned.split(/[––-]/).filter(Boolean).map(parseFloat);
  if (parts.length === 0) return 0;
  if (parts.length === 1) return parts[0];
  return (parts[0] + parts[1]) / 2;
}

function ethyleneTargetNum(crop) {
  const m = String(crop.ethyleneThreshold).match(/[0-9]*\.?[0-9]+/);
  return m ? parseFloat(m[0]) : 0.1;
}

function jitter(base, amplitude) {
  return base + (Math.random() * 2 - 1) * amplitude;
}

function roomSeed(roomId) {
  let h = 0;
  for (let i = 0; i < (roomId || '').length; i++) h = (h * 31 + roomId.charCodeAt(i)) | 0;
  return Math.abs(h % 10000) / 10000;
}

const ATTENTION_REASONS = [
  'Check for storage leak — pressure trending down',
  'Check AC unit — temperature drift detected',
  'Check IMCP sensor readings — calibration drift'
];

function assignAttention(rooms) {
  if (!rooms || rooms.length === 0) return;
  let indices;
  if (rooms.length >= 20)      indices = [6, 13];
  else if (rooms.length >= 12) indices = [3, 8];
  else if (rooms.length >= 10) indices = [Math.floor(rooms.length / 2)];
  else if (rooms.length >= 4)  indices = [rooms.length - 2];
  else                         indices = [rooms.length - 1];
  indices.forEach((idx, i) => {
    if (rooms[idx]) rooms[idx].attentionReason = ATTENTION_REASONS[i % ATTENTION_REASONS.length];
  });
}

function roomEthylene(room) {
  const crop = CROPS[room.cropId];
  const t = ethyleneTargetNum(crop);
  if (room.attentionReason) {
    // 10% over target — visibly out of range
    return Math.round(t * 1.1 * 1000) / 1000;
  }
  const seed = roomSeed(room.id);
  if (room.atmosOn) {
    const offset = (seed - 0.5) * 0.1; // ±5%
    return Math.round(t * (0.8 + offset) * 1000) / 1000;
  }
  // OFF: vary 3.5×–4.5× of target so all rooms differ
  return Math.round(t * (3.5 + seed) * 1000) / 1000;
}

function roomTemp(room) {
  const crop = CROPS[room.cropId];
  const t = rangeMid(crop.tempRange);
  const seed = roomSeed(room.id);
  if (room.attentionReason) return Math.round((t + 1.5) * 10) / 10;
  if (room.atmosOn) return Math.round((t + (seed - 0.5) * 0.4) * 10) / 10;
  return Math.round((t + 2.5 + seed * 1.5) * 10) / 10;
}

function roomO2(room) {
  const crop = CROPS[room.cropId];
  const t = rangeMid(crop.o2Range);
  const seed = roomSeed(room.id);
  if (room.attentionReason) return Math.round((t * 1.4) * 10) / 10;
  if (room.atmosOn) return Math.round((t * (0.95 + (seed - 0.5) * 0.1)) * 10) / 10;
  return Math.round((20.8 - seed * 0.5) * 10) / 10; // ambient
}

function roomCO2(room) {
  const crop = CROPS[room.cropId];
  const t = rangeMid(crop.co2Range);
  const seed = roomSeed(room.id);
  if (room.attentionReason) return Math.round((t * 0.6) * 10) / 10;
  if (room.atmosOn) return Math.round((t * (0.97 + (seed - 0.5) * 0.06)) * 10) / 10;
  return Math.round((0.04 + seed * 0.05) * 100) / 100; // ambient
}

function facilitySeed(name) {
  let h = 0;
  const s = name || '';
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h % 10000) / 10000;
}

function facilityKpis(facility) {
  const seed = facilitySeed(facility.name);
  const onCount = facility.rooms.filter(r => r.atmosOn && !r.attentionReason).length;
  const totalRooms = facility.rooms.length || 1;
  const efficiency = onCount / totalRooms; // 0..1
  // Per-room baseline: $1,200/mo savings at full Atmos efficiency, ±15% per facility
  const perRoom = 1100 + Math.round(seed * 250);
  const savings = Math.round(perRoom * onCount);
  const tons = Math.round((onCount * 0.18 + seed * 0.4) * 10) / 10;
  // Energy delta: -12% to -22%, scaled by efficiency
  const energy = -Math.round(12 + efficiency * 10 + seed * 2);
  return { savings, tons, energy };
}

function injectIncident() {

  if (!facility || !facility.rooms.length) return;
  const candidates = facility.rooms.filter(r => !r.attentionReason);
  if (!candidates.length) return;
  const target = candidates[Math.floor(Math.random() * candidates.length)];
  const reasons = [
    'Sudden ethylene spike — investigate fruit ripeness',
    'Door cycle anomaly — check seal integrity',
    'Compressor lag — temperature rising'
  ];
  target.attentionReason = reasons[Math.floor(Math.random() * reasons.length)];
  // Notification
  const idx = facility.rooms.indexOf(target);
  state.notifications = state.notifications || [];
  state.notifications.unshift({
    timeAgo: 'Just now',
    roomName: `Room ${idx + 1}: ${target.name}`,
    roomId: target.id,
    issue: 'New incident detected',
    severity: 'crit',
    cause: target.attentionReason
  });
  // AI toast
  const sugIdx = Math.floor(Math.random() * AI_SUGGESTIONS.length);
  state.toast = {
    message: AI_SUGGESTIONS[sugIdx](idx + 1),
    roomId: target.id
  };
  saveState();
  render();
}

function dismissToast() {
  state.toast = null;
  saveState();
  render();
}

function acceptToast() {
  if (!state.toast || !state.facility) { dismissToast(); return; }
  const room = state.facility.rooms.find(r => r.id === state.toast.roomId);
  if (room) {
    room.attentionReason = null;
    // Drop matching notification
    state.notifications = (state.notifications || []).filter(n => n.roomId !== room.id);
  }
  state.toast = null;
  saveState();
  render();
}

function computeBarFills(room) {
  const crop = CROPS[room.cropId];
  const on = room.atmosOn;
  const greenColor = '#2e7d32';
  const tealColor = '#4db6ac';
  const lightTeal = '#a8d8d4';

  const ethyTarget = ethyleneTargetNum(crop);
  const ethyValue = on ? jitter(ethyTarget * 0.8, ethyTarget * 0.05) : jitter(ethyTarget * 4, ethyTarget * 0.5);
  const ethyW = on ? Math.min(25, (ethyValue / Math.max(ethyTarget, 0.01)) * 30) : Math.min(80, (ethyValue / Math.max(ethyTarget, 0.01)) * 25);

  const tempMid = rangeMid(crop.tempRange);
  const tempVal = on ? jitter(tempMid, 0.2) : jitter(tempMid + 3, 0.5);

  const humMid = rangeMid(crop.humidityRange);
  const humVal = on ? jitter(humMid, 0.5) : jitter(humMid - 3, 1);

  const presVal = jitter(1.01, on ? 0.005 : 0.02);

  const o2Mid = rangeMid(crop.o2Range);
  const o2Val = on ? jitter(o2Mid, 0.1) : jitter(20.8, 0.3);

  return {
    ethylene: { w: ethyW, color: on ? greenColor : '#c0392b', value: ethyValue.toFixed(3) },
    temp:     { w: on ? 25 : 55, color: greenColor, value: tempVal.toFixed(1) },
    hum:      { w: on ? 92 : 84, color: tealColor,  value: humVal.toFixed(1) },
    pres:     { w: on ? 50 : 52, color: tealColor,  value: presVal.toFixed(2) },
    o2:       { w: on ? 25 : 75, color: lightTeal,  value: o2Val.toFixed(2) }
  };
}

      if (!q || q.length < 1) { sugDiv.style.display = 'none'; sugDiv.innerHTML = ''; return; }
      const lower = q.toLowerCase();
      const matches = COMPANIES.filter(c =>
        c.matchKeys.some(k => k.startsWith(lower) || lower.startsWith(k)) ||
        c.displayName.toLowerCase().includes(lower)
      );
      if (matches.length === 0) { sugDiv.style.display = 'none'; return; }
      sugDiv.style.display = 'block';
      sugDiv.innerHTML = matches.map(c =>
        `<div class="item" data-name="${escHtml(c.displayName)}">${escHtml(c.displayName)}</div>`
      ).join('');

function startAiSearch() {
  state._aiPhase = 'searching';
  render();
  const statuses = ['Searching the web…', 'Finding cool-room locations…', 'Identifying products stored…'];
  let i = 0;
  const interval = setInterval(() => {
    i = (i + 1) % statuses.length;
    const el = document.getElementById('spinner-status');
    if (el) el.textContent = statuses[i];
  }, 1000);

  setTimeout(() => {
    clearInterval(interval);
    const matched = matchCompany(state.aiInput);
    if (matched) {
      state._aiMatched = matched;
      state._aiPhase = 'found';
    } else {
      state._aiPhase = 'notfound';
    }
    render();
  }, 3000);
}

                const status = attention ? 'crit' : (r.atmosOn ? 'ok' : 'warn');
                const badgeText = attention ? 'NEEDS ATTENTION' : (r.atmosOn ? 'At optimal' : 'Operational');
                const alertCls = attention ? 'alert' : '';
                return `
                  <div class="tile ${attention ? 'attention' : ''}" data-id="${escHtml(r.id)}">
                    <h4>#${i + 1} · ${escHtml(r.name)}</h4>
                    <div class="crop">${escHtml(crop.displayName)}</div>
                    <div class="tile-metrics">
                      <div class="tile-metric"><div class="m-lbl">Ethylene</div><div class="m-val ${alertCls}">${ethy.toFixed(3)} <small>ppm</small></div></div>
                      <div class="tile-metric"><div class="m-lbl">Temp</div><div class="m-val ${alertCls}">${temp}°C</div></div>
                      <div class="tile-metric"><div class="m-lbl">O₂</div><div class="m-val ${alertCls}">${o2}%</div></div>
                      <div class="tile-metric"><div class="m-lbl">CO₂</div><div class="m-val ${alertCls}">${co2}%</div></div>
                    </div>
                    <div style="margin-top:10px;">

                      <span class="atmos-pill ${r.atmosOn ? 'on' : ''}">Atmos ${r.atmosOn ? 'ON' : 'OFF'}</span>
                    </div>
                    ${attention ? `<div class="reason">⚠ ${escHtml(attention)}</div>` : ''}
                  </div>
                `;
              }).join('')}
            </div>
          ` : `
            <div id="map-container"></div>
          `}
        </div>
      </div>
    </div>
    ${state.notifPanelOpen ? renderNotifPanel(notifs) : ''}
    ${state.toast ? renderToast(state.toast) : ''}
  `;

  document.getElementById('reset-btn').onclick = () => { if (confirm('Reset demo to splash?')) resetState(); };
  bindNavArrows();
  bindToast();
  const inj = document.getElementById('inject-btn');
  if (inj) inj.onclick = injectIncident;
  document.getElementById('t-map').onclick = () => { state.dashboardView = 'map'; state.notifPanelOpen = false; saveState(); render(); };
  document.getElementById('t-grid').onclick = () => { state.dashboardView = 'grid'; state.notifPanelOpen = false; saveState(); render(); };
  document.getElementById('add-room').onclick = () => {
    state.wizardDraft = { name: facility.name, hq: facility.hq, rooms: facility.rooms.map(r => ({ ...r })) };
    state.notifPanelOpen = false;
    setView('wizard-step2');
  };
  document.getElementById('atmos-all').onclick = () => {
    const target = !allOn;
    facility.rooms.forEach(r => { r.atmosOn = target; });
    saveState();
    render();
  };
  document.getElementById('bell-btn').onclick = (e) => {
    e.stopPropagation();
    state.notifPanelOpen = !state.notifPanelOpen;
    render();
  };

  if (state.notifPanelOpen) wireNotifPanel(facility);

  if (state.dashboardView === 'grid') {
    document.querySelectorAll('.tile').forEach(el => {
      el.onclick = () => {
        state.currentRoomId = el.dataset.id;
        state.notifPanelOpen = false;
        setView('room');
      };
    });
  }

  if (state.dashboardView === 'map') {
    setTimeout(() => initFacilityMap(facility), 0);
  }
}

function initFacilityMap(facility) {
  const el = document.getElementById('map-container');
  if (!el) return;
  if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }
  _leafletMap = L.map(el);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '© OpenStreetMap'
  }).addTo(_leafletMap);

  facility.rooms.forEach((room, i) => {
    const crop = CROPS[room.cropId] || { displayName: '(unknown)' };
    const ethy = roomEthylene(room);
    const number = i + 1;
    const pinClass = room.attentionReason ? 'crit' : (room.atmosOn ? 'on' : 'off');
    const icon = L.divIcon({
      className: '',
      html: `<div class="room-pin-inner ${pinClass}">${number}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });
    const marker = L.marker([room.lat, room.lng], { icon }).addTo(_leafletMap);
    marker.bindPopup(`
      <div style="font-family:'Segoe UI',sans-serif;font-size:13px;min-width:200px;">
        <strong>#${number} · ${escHtml(room.name)}</strong><br>
        ${escHtml(crop.displayName)}<br>
        <span style="color:#888;">Ethylene: ${ethy.toFixed(3)} ppm</span><br>
        <span style="color:#888;">Atmos: ${room.atmosOn ? 'ON ✓' : 'OFF'}</span>
        ${room.attentionReason ? `<br><span style="color:#c0392b;font-weight:700;">⚠ ${escHtml(room.attentionReason)}</span>` : ''}
        <br><a href="#" data-open-room="${escHtml(room.id)}">Open room →</a>
      </div>
    `);
    marker.on('popupopen', () => {
      const link = document.querySelector('[data-open-room="' + room.id + '"]');
      if (link) link.onclick = (e) => { e.preventDefault(); state.currentRoomId = room.id; setView('room'); };
    });
  });

  if (facility.rooms.length > 1) {
    const bounds = L.latLngBounds(facility.rooms.map(r => [r.lat, r.lng]));
    _leafletMap.fitBounds(bounds, { padding: [40, 40] });
  } else if (facility.rooms.length === 1) {
    _leafletMap.setView([facility.rooms[0].lat, facility.rooms[0].lng], 9);
  } else {
    _leafletMap.setView([facility.lat, facility.lng], 6);
  }
}

// === ATMOS TOGGLE ANIMATION ===
let _atmosAnimating = false;

function animateAtmosToggle(room) {
  _atmosAnimating = true;
  const startFills = computeBarFills(room); // current (pre-toggle) state
  const startEthy = parseFloat(startFills.ethylene.value);
  const startHum = parseFloat(startFills.hum.value);
  const startTemp = parseFloat(startFills.temp.value);
  const startPres = parseFloat(startFills.pres.value);
  const startO2 = parseFloat(startFills.o2.value);

  // Flip state
  room.atmosOn = !room.atmosOn;
  saveState();

  const endFills = computeBarFills(room); // target state
  const endEthy = parseFloat(endFills.ethylene.value);
  const endHum = parseFloat(endFills.hum.value);
  const endTemp = parseFloat(endFills.temp.value);
  const endPres = parseFloat(endFills.pres.value);
  const endO2 = parseFloat(endFills.o2.value);

  const crop = CROPS[room.cropId];
  const cropTitle = crop.displayName.split(' — ')[0];
  const cropSub = crop.displayName.includes(' — ') ? crop.displayName.split(' — ')[1] : '';

  // Update toggle button + status text + system status pill (no animation needed)
  const toggle = document.getElementById('atmos-toggle');
  if (toggle) {
    toggle.classList.toggle('on', room.atmosOn);
    toggle.textContent = '⏻ ATMOS ' + (room.atmosOn ? 'ON' : 'OFF');
  }
  const statusText = document.querySelector('.atmos-status');
  if (statusText) {
    statusText.classList.toggle('warn', !room.atmosOn);
    statusText.textContent = room.atmosOn
      ? '✓ All 5 factors at ' + (cropSub || cropTitle) + ' optimal — Atmos is working'
      : 'Press to see Atmos bring all factors to ' + cropTitle.toLowerCase() + ' optimal levels';
  }
  const sysPill = document.querySelector('.system-status-card .pill');
  if (sysPill) {
    sysPill.classList.toggle('warn', !room.atmosOn);
    sysPill.textContent = room.atmosOn ? '✓ at optimal' : '⚠ operational';
  }

  // Trigger CSS transition on bar widths/colors (3s)
  const barRows = document.querySelectorAll('.bars-card .bar-row');
  const keys = ['ethylene', 'temp', 'hum', 'pres', 'o2'];
  barRows.forEach((row, i) => {
    const k = keys[i];
    const fill = row.querySelector('.bar-fill');
    if (fill) {
      fill.style.width = endFills[k].w + '%';
      fill.style.background = endFills[k].color;
    }
  });

  // Animate numeric readouts via rAF over 3s
  const startTime = performance.now();
  const dur = 3000;
  function tick(now) {
    const t = Math.min(1, (now - startTime) / dur);
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const ethy = startEthy + (endEthy - startEthy) * eased;
    const hum = startHum + (endHum - startHum) * eased;
    const temp = startTemp + (endTemp - startTemp) * eased;
    const pres = startPres + (endPres - startPres) * eased;
    const o2 = startO2 + (endO2 - startO2) * eased;

    const ethyEl = document.querySelector('.ethy-big');
    if (ethyEl) ethyEl.textContent = ethy.toFixed(3);
    const minis = document.querySelectorAll('.stat-card .mini .v');
    if (minis.length === 4) {
      minis[0].textContent = hum.toFixed(1) + '%';
      minis[1].textContent = temp.toFixed(1) + '°C';
      minis[2].textContent = pres.toFixed(2) + ' atm';
      minis[3].textContent = o2.toFixed(2) + '%';
    }

    if (t < 1) requestAnimationFrame(tick);
    else {
      // Re-render chart at the end (chart needs full redraw — has ATMOS ACTIVATED line)
      const chartMount = document.getElementById('chart-mount');
      if (chartMount) chartMount.innerHTML = chartSvg(room);
      _atmosAnimating = false;
    }
  }
  requestAnimationFrame(tick);
}

// === CHART ===
function chartSvg(room) {
  const crop = CROPS[room.cropId];
  const W = 980, H = 220, padL = 40, padR = 100, padT = 20, padB = 30;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const N = 48;
  const activatedAt = N * 0.7;
  const on = room.atmosOn;

  function pathFor(beforeBase, afterBase, beforeAmp, afterAmp, scaleMin, scaleMax, color) {
    const points = [];
    for (let i = 0; i < N; i++) {
      const isBefore = i < activatedAt;
      let v;
      if (on) {
        v = isBefore ? beforeBase + (Math.random() - 0.5) * beforeAmp : afterBase + (Math.random() - 0.5) * afterAmp;
      } else {
        v = beforeBase + (Math.random() - 0.5) * beforeAmp;
      }
      const x = padL + (i / (N - 1)) * innerW;
      const denom = (scaleMax - scaleMin) || 1;
      const y = padT + innerH - ((v - scaleMin) / denom) * innerH;
      points.push([x, Math.max(padT, Math.min(padT + innerH, y))]);
    }
    const d = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
    return `<path d="${d}" stroke="${color}" stroke-width="1.6" fill="none"/>`;
  }

  const ethyTarget = ethyleneTargetNum(crop);
  const tempMid = rangeMid(crop.tempRange);
  const humMid = rangeMid(crop.humidityRange);
  const o2Mid = rangeMid(crop.o2Range);

  const lines = [
    pathFor(ethyTarget * 4, ethyTarget * 0.8, ethyTarget * 1.5, ethyTarget * 0.05, 0, ethyTarget * 6, '#1a6b1a'),
    pathFor(tempMid + 3, tempMid, 0.6, 0.2, tempMid - 5, tempMid + 8, '#4caf50'),
    pathFor(humMid - 2, humMid, 1.5, 0.4, humMid - 12, humMid + 4, '#7fc4be'),
    pathFor(1.01, 1.01, 0.04, 0.005, 0.95, 1.10, '#4db6ac'),
    pathFor(o2Mid * 6, o2Mid, 0.8, 0.1, 0, Math.max(o2Mid * 8, 25), '#a8d8d4')
  ];

  const activatedX = padL + (activatedAt / (N - 1)) * innerW;
  const activatedLine = on ? `
    <line x1="${activatedX}" y1="${padT}" x2="${activatedX}" y2="${H - padB}" stroke="#1a6b1a" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="${activatedX - 60}" y="${padT - 14}" width="120" height="20" fill="#1a6b1a" rx="3"/>
    <text x="${activatedX}" y="${padT}" fill="white" font-size="10" font-weight="700" text-anchor="middle">ATMOS ACTIVATED</text>
  ` : '';

  const xLabels = ['11:00','12:10','13:20','14:30','15:40','16:50','18:00','19:10','20:20','21:30','22:50']
    .map((t, i) => {
      const x = padL + (i / 10) * innerW;
      return `<text x="${x}" y="${H - 6}" font-size="9" fill="#888" text-anchor="middle">${t}</text>`;
    }).join('');

  const legendItems = [
    { c: '#1a6b1a', label: 'Ethylene' },
    { c: '#4caf50', label: 'Temperature' },
    { c: '#7fc4be', label: 'Humidity' },
    { c: '#4db6ac', label: 'Pressure' },
    { c: '#a8d8d4', label: 'Oxygen' }
  ];
  const legend = legendItems
    .map((it, i) => `<g><circle cx="${padL + i * 110 + 4}" cy="${H + 8}" r="4" fill="${it.c}"/><text x="${padL + i * 110 + 14}" y="${H + 12}" font-size="10" fill="#888">${it.label}</text></g>`)
    .join('');

  return `<svg viewBox="0 0 ${W} ${H + 24}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block;">
    ${lines.join('')}
    ${activatedLine}
    ${xLabels}
    ${legend}
  </svg>`;
}

// === LIVE TICK ===
let _liveTickInterval = null;

function startLiveTick() {
  if (_liveTickInterval) clearInterval(_liveTickInterval);
  _liveTickInterval = setInterval(() => {
    if (state.view !== 'room') return;
    if (_atmosAnimating) return;
    const facility = state.facility;
    if (!facility) return;
    const room = facility.rooms.find(r => r.id === state.currentRoomId);
    if (!room) return;
    const fills = computeBarFills(room);
    const ethyEl = document.querySelector('.ethy-big');
    if (ethyEl) ethyEl.textContent = fills.ethylene.value;
    const barRows = document.querySelectorAll('.bars-card .bar-row');
    const keys = ['ethylene', 'temp', 'hum', 'pres', 'o2'];
    barRows.forEach((row, i) => {
      const k = keys[i];
      if (!fills[k]) return;
      const fill = row.querySelector('.bar-fill');
      if (fill) {
        fill.style.width = fills[k].w + '%';
        fill.style.background = fills[k].color;
      }
    });
    const minis = document.querySelectorAll('.stat-card .mini .v');
    if (minis.length === 4) {
      minis[0].textContent = fills.hum.value + '%';
      minis[1].textContent = fills.temp.value + '°C';
      minis[2].textContent = fills.pres.value + ' atm';
      minis[3].textContent = fills.o2.value + '%';
    }
  }, 2000);
}

// === BOOT ===
loadState();
render();
startLiveTick();
</script>
</body>
</html>
